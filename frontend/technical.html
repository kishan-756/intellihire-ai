<!DOCTYPE html>
<html>

<head>
    <title>Technical Round</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2>Technical Round</h2>

    <div id="progress">
        Round 3 / 4 : Technical
    </div>
    <h3 id="timer"></h3>

    <div id="question"></div>

    <textarea id="answer"></textarea>
    <br>
    <button onclick="submit()">Submit</button>

    <script>
        let token = localStorage.getItem("token")

        if (!token) {

            alert("Please login first")

            window.location = "login.html"

        }

        let interview = JSON.parse(localStorage.getItem("interviewData"))
        let questions = interview.technical
        let index = 0
        let technicalScore = 0
        let time = 900; // 15 minutes

        setInterval(() => {

            time--;
            
            let minutes = Math.floor(time / 60);
            let seconds = time % 60;

            document.getElementById("timer").innerText =
                "Time Remaining: " + minutes + "m " + seconds + "s";

            if (time <= 0) {

                alert("Time Up")

                localStorage.setItem("technicalScore", technicalScore)

                window.location = "hr.html"

            }

        }, 1000)

        function show() {
            document.getElementById("question").innerText = questions[index].question
        }

        function submit() {

            let answer = document.getElementById("answer").value

            if (answer.length > 20) {
                technicalScore++
            }

            index++
            document.getElementById("answer").value = ""

            if (index < questions.length) {
                show()
            }
            else {
                localStorage.setItem("technicalScore", technicalScore)
                window.location = "hr.html"
            }

        }

        show()

    </script>

    <script src="theme.js"></script>
</body>

</html>
